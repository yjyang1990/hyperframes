    <style>body {
        margin: 0;
        padding: 0;
        background: #f5f0e8; /* Pale Linen */
        overflow: hidden;
        width: 1080px;
        height: 1920px;
      }
      #main-container {
        position: relative;
        width: 1080px;
        height: 1920px;
      }
      .full-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }
      #bg-comp,
      #stats-comp,
      #captions-comp,
      #a-roll-frame {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }
      #bg-comp {
        z-index: 0;
      }
      #a-roll-frame {
        z-index: 10;
        overflow: hidden;
      }
      #a-roll,
      #a-roll-frame img.__render_frame__,
      #a-roll-frame img.__preview_render_frame__ {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #stats-comp {
        z-index: 20;
        pointer-events: none;
      }
      #captions-comp {
        z-index: 30;
        pointer-events: none;
      }

[data-composition-id="background-grid"] {
        width: 1080px;
        height: 1920px;
        background-color: #f5f0e8; /* Pale Linen */
        overflow: hidden;
        position: relative;
      }

      [data-composition-id="background-grid"] .canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }

      [data-composition-id="background-grid"] .wash {
        position: absolute;
        width: 120%;
        height: 120%;
        top: -10%;
        left: -10%;
        filter: blur(100px);
        opacity: 0.15;
        pointer-events: none;
      }

      [data-composition-id="background-grid"] .wash.blush {
        background: radial-gradient(circle, #e8d0c0 0%, transparent 70%);
        transform: translate(-10%, -10%);
      }

      [data-composition-id="background-grid"] .wash.gold {
        background: radial-gradient(circle, #e5d9b0 0%, transparent 70%);
        transform: translate(10%, 10%);
      }

      [data-composition-id="background-grid"] .grid-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="background-grid"] .grid-line {
        position: absolute;
        background-color: #444444; /* Darkened Soft Graphite */
