    <style>body,
      html {
        margin: 0;
        padding: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background-color: #faf5e8;
      }
      #master-composition {
        width: 1080px;
        height: 1920px;
        position: relative;
        z-index: 0;
      }
      #bg-comp {
        z-index: 1;
      }
      #aroll-comp {
        z-index: 2;
      }
      #hero-comp {
        z-index: 3;
      }
      #mograph-comp {
        z-index: 4;
      }
      #captions-comp {
        z-index: 5;
      }

[data-composition-id="background"] {
        width: 1080px;
        height: 1920px;
        background-color: transparent;
        position: relative;
        overflow: hidden;
        font-family: "Helvetica", "Arial", sans-serif;
      }

      /* Subtle Paper Texture */
      [data-composition-id="background"] .paper-texture {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.1; /* Increased for tactile feel */
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      [data-composition-id="background"] .grid-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="background"] .line {
        position: absolute;
        background-color: #000000;
      }

      [data-composition-id="background"] .horizontal {
        width: 100%;
        left: 0;
        transform: scaleX(0);
        transform-origin: left center;
      }

      [data-composition-id="background"] .vertical {
        height: 100%;
        top: 0;
        transform: scaleY(0);
        transform-origin: center top;
      }

      [data-composition-id="background"] .circle-element {
        position: absolute;
        width: 400px;
        height: 400px;
        background-color: #be1e2d;
        border-radius: 50%;
        top: 25%;
        left: 60%;
        transform: scale(0);
        z-index: 10;
      }
    


      [data-composition-id="aroll"] {
        background: transparent;
        font-family: sans-serif;
        overflow: hidden;
        width: 1080px;
